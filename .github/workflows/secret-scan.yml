name: Secret Scan

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "35 3 * * 1"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Use filesystem scan (--no-git) so the first push to a new repo does not
      # fail when gitleaks-action builds a git range like root^..HEAD (root^ is invalid).
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION="8.24.3"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks detect --source . --no-git --verbose --config .gitleaks.toml

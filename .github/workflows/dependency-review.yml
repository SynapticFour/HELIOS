name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # actions/dependency-review-action requires Dependency graph (repo Settings → Code security).
    # Until enabled, the action fails fast; do not block merges on this alone.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

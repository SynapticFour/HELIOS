name: Dependabot Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: dependabot-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Python smoke
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check src/ tests/
          mypy src/helios/
          pytest tests/ -q
